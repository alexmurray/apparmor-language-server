name: Build and test

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["pypy3.10", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Test with pytest
        run: |
          python -m pip install pytest-cov
          pytest --doctest-modules --junitxml=junit/test-results.xml --cov=apparmor_language_server --cov-report=xml --cov-report=html
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ matrix.python-version }}
          path: htmlcov
      - name: Install ruff for code linting and format checking
        run: python -m pip install ruff
      - name: Lint with ruff
        run: ruff check --output-format=github --target-version=py310
      - name: Check formatting with ruff
        run: ruff format --diff --target-version=py310

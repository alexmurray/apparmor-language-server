title: AppArmor Language Server
name: apparmor-language-server
adopt-info: apparmor-language-server
base: core24
summary: Language server for AppArmor profiles
description: |
  This is a language server for AppArmor profiles, which provides features such
  as code completion, linting, and diagnostics for AppArmor profiles. It is
  designed to be used with editors that support the Language Server Protocol
  (LSP), such as Visual Studio Code, Vim, and Emacs.

  To ensure that the language server has access to the necessary AppArmor
  profiles, it is recommended to connect the snap to the 'etc-apparmor-d'
  system-files plug, which allows read access to the /etc/apparmor.d directory
  where AppArmor profiles are typically stored. This can be done by running the
  following command after installing the snap:

  ```bash
  sudo snap connect apparmor-language-server:etc-apparmor-d
  ```

grade: stable # must be 'stable' to release into candidate/stable channels
license: GPL-3.0+
confinement: strict
source-code: https://github.com/alexmurray/apparmor-language-server
contact: https://github.com/alexmurray/apparmor-language-server/issues
issues: https://github.com/alexmurray/apparmor-language-server/issues
website: https://github.com/alexmurray/apparmor-language-server
icon: snap/icon.svg

apps:
  apparmor-language-server:
    command: bin/apparmor-language-server
    plugs:
      - network-bind # for --tcp
      - network
      - home
      - hostfs-etc-apparmor

plugs:
  hostfs-etc-apparmor:
    interface: system-files
    read:
      - /var/lib/snapd/hostfs/etc/apparmor
      - /var/lib/snapd/hostfs/etc/apparmor.d

parts:
  apparmor-language-server:
    plugin: python
    source: .
    build-packages:
      - git
    build-snaps:
      - yq
    override-pull: |
      craftctl default
      # read version from pyproject.toml and set it as the snap version along
      # with the git short hash
      craftctl set version=$(/snap/yq/current/bin/yq ".project.version" pyproject.toml)-$(git rev-parse --short HEAD)

  apparmor-parser:
    plugin: nil
    stage-packages:
      - apparmor
    prime:
      - sbin/apparmor_parser
